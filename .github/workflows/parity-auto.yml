name: Parity Auto Trigger
run-name: "Parity auto-trigger · pytorch/pytorch main"

# Polls completed pytorch/pytorch trunk.yml pushes on main and dispatches
# parity.yml once per upstream SHA. This PR intentionally scopes automation to
# the trunk/default mi355 report; other ROCm arch/workflow coverage can be added
# later without exposing workflow/job regexes as manual inputs.

on:
  schedule:
    - cron: '*/10 * * * *'
  pull_request:
    paths:
      - '.github/workflows/parity-auto.yml'
  workflow_dispatch:
    inputs:
      max_commits:
        description: 'How many recent completed upstream trunk.yml pushes on main to scan.'
        required: false
        default: '200'
        type: string
      max_dispatches:
        description: 'Maximum number of ready upstream commits to dispatch in one scan.'
        required: false
        default: '50'
        type: string
      max_age_hours:
        description: 'Skip commits older than this.'
        required: false
        default: '72'
        type: string
      target_ref:
        description: 'Ref of this repo to dispatch parity.yml against. Leave blank to use this workflow run ref.'
        required: false
        default: ''
        type: string
      dry_run:
        description: 'Scan and log, but do not dispatch parity.yml.'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  actions: write

concurrency:
  group: parity-auto-trigger
  cancel-in-progress: false

jobs:
  scan-and-dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Find completed trunk commits and dispatch parity.yml
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM: pytorch/pytorch
          BRANCH: main
          PARITY_ARCH: mi355
          AUTOPARITY_PREFIX: autoparity
          MAX_COMMITS: ${{ github.event_name == 'pull_request' && '20' || inputs.max_commits || '200' }}
          MAX_DISPATCHES: ${{ github.event_name == 'pull_request' && '5' || inputs.max_dispatches || '50' }}
          MAX_AGE_HOURS: ${{ inputs.max_age_hours || '72' }}
          TARGET_REF_IN: ${{ inputs.target_ref || '' }}
          DRY_RUN: ${{ github.event_name == 'pull_request' && 'true' || inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail

          case "$MAX_COMMITS" in ''|*[!0-9]*) echo "::error::max_commits must be numeric"; exit 1 ;; esac
          case "$MAX_DISPATCHES" in ''|*[!0-9]*) echo "::error::max_dispatches must be numeric"; exit 1 ;; esac
          case "$MAX_AGE_HOURS" in ''|*[!0-9]*) echo "::error::max_age_hours must be numeric"; exit 1 ;; esac

          NOW_EPOCH=$(date -u +%s)
          MAX_AGE_EPOCH=$((NOW_EPOCH - MAX_AGE_HOURS * 3600))
          SINCE=$(date -u -d "@$MAX_AGE_EPOCH" '+%Y-%m-%dT%H:%M:%SZ')
          TARGET_REF="${TARGET_REF_IN:-$GITHUB_REF_NAME}"

          echo "Upstream:       $UPSTREAM@$BRANCH"
          echo "Target ref:     $TARGET_REF"
          echo "Parity arch:    $PARITY_ARCH"
          echo "Max commits:    $MAX_COMMITS"
          echo "Max dispatches: $MAX_DISPATCHES"
          echo "Max age:        ${MAX_AGE_HOURS}h"
          echo "Dry run:        $DRY_RUN"
          echo

          # Completed trunk workflow runs are the readiness source for this PR:
          # no separate check-run regex matching is needed for trunk-only default
          # reports, and pagination keeps MAX_COMMITS truthful above 100.
          COMMITS=$(gh api --paginate \
            "repos/$UPSTREAM/actions/workflows/trunk.yml/runs?branch=$BRANCH&event=push&status=completed&per_page=100" \
            --jq '.workflow_runs[] | {head_sha, created_at}' |
            jq -rs --arg max "$MAX_COMMITS" '
              reduce .[] as $run ({seen:{}, rows:[]};
                if .seen[$run.head_sha] then .
                else .seen[$run.head_sha] = true | .rows += [$run]
                end
              )
              | .rows[:($max | tonumber)][]
              | "\(.head_sha) \(.created_at)"
            ')

          if [ -z "$COMMITS" ]; then
            echo "::warning::No completed trunk.yml push runs returned from $UPSTREAM@$BRANCH"
            exit 0
          fi

          # Deduplicate only auto-parity-created parity runs. Manual parity.yml
          # runs should not suppress automation for a SHA.
          EXISTING=$(gh api --paginate \
            "repos/$GITHUB_REPOSITORY/actions/workflows/parity.yml/runs?event=workflow_dispatch&created=%3E%3D$SINCE&per_page=100" \
            --jq '.workflow_runs[] | {display_title, created_at}' |
            jq -s --arg prefix "${AUTOPARITY_PREFIX}-" \
              '[.[] | select((.display_title // "") | startswith($prefix))]')

          sha_already_dispatched() {
            local sha="$1"
            echo "$EXISTING" | jq -e --arg sha "$sha" \
              'any(.[]; (.display_title // "") | contains($sha))' >/dev/null
          }

          DISPATCHED_COUNT=0
          DISPATCHED_SUMMARY=""
          while IFS=' ' read -r SHA DATE; do
            [ -z "$SHA" ] && continue
            SHORT=$(echo "$SHA" | cut -c1-8)
            COMMIT_EPOCH=$(date -u -d "$DATE" +%s 2>/dev/null || echo 0)

            if [ "$COMMIT_EPOCH" -ne 0 ] && [ "$COMMIT_EPOCH" -lt "$MAX_AGE_EPOCH" ]; then
              echo "[$SHORT] $DATE  too old (>${MAX_AGE_HOURS}h) - stopping scan"
              break
            fi

            if sha_already_dispatched "$SHA"; then
              echo "[$SHORT] auto parity report already exists for this SHA - skip"
              continue
            fi

            CSV_NAME="${AUTOPARITY_PREFIX}-$(date -u +%Y%m%d)-$SHA"
            echo "[$SHORT] completed trunk run at $DATE - ready for $PARITY_ARCH default parity"

            if [ "$DRY_RUN" = "true" ]; then
              echo "[$SHORT] DRY_RUN=true - would dispatch parity.yml"
            else
              gh workflow run parity.yml \
                --repo "$GITHUB_REPOSITORY" \
                --ref "$TARGET_REF" \
                -f sha="$SHA" \
                -f arch="$PARITY_ARCH" \
                -f exclude_distributed=true \
                -f exclude_inductor=true \
                -f csv_name="$CSV_NAME"
            fi

            DISPATCHED_COUNT=$((DISPATCHED_COUNT + 1))
            DISPATCHED_SUMMARY="${DISPATCHED_SUMMARY}${SHORT}:${PARITY_ARCH}"$'\n'
            if [ "$DISPATCHED_COUNT" -ge "$MAX_DISPATCHES" ]; then
              echo "Reached max dispatches for this scan ($MAX_DISPATCHES); stopping"
              break
            fi
          done <<< "$COMMITS"

          {
            echo "### Parity auto-trigger"
            echo ""
            echo "- Upstream:       \`$UPSTREAM@$BRANCH\`"
            echo "- Scope:          completed \`trunk.yml\` pushes"
            echo "- Parity report:  \`$PARITY_ARCH\` default tests"
            echo "- Max commits:    $MAX_COMMITS"
            echo "- Max dispatches: $MAX_DISPATCHES"
            echo "- Max age:        ${MAX_AGE_HOURS}h"
            echo "- Target ref:     \`$TARGET_REF\`"
            if [ "$DISPATCHED_COUNT" -gt 0 ]; then
              if [ "$DRY_RUN" = "true" ]; then
                echo "- Result:         would dispatch $DISPATCHED_COUNT parity run(s) (dry-run)"
              else
                echo "- Result:         dispatched $DISPATCHED_COUNT parity run(s)"
              fi
              echo ""
              echo "$DISPATCHED_SUMMARY" | while IFS= read -r LINE; do
                [ -z "$LINE" ] && continue
                echo "- $LINE"
              done
            else
              echo "- Result:         no ready unprocessed SHAs found"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
