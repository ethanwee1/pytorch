name: Parity Report

on:
  workflow_dispatch:
    inputs:
      # download_testlogs flags
      sha:
        description: 'PyTorch commit SHA (leave empty for latest green)'
        required: false
        type: string
      pr_id:
        description: 'Pull request ID (alternative to SHA)'
        required: false
        type: string
      arch:
        description: 'ROCm architectures (comma or space separated)'
        required: false
        default: 'mi355, mi300, mi200'
        type: string
      exclude_distributed:
        description: 'Exclude distributed tests'
        required: false
        default: false
        type: boolean
      exclude_inductor:
        description: 'Exclude inductor tests'
        required: false
        default: false
        type: boolean
      exclude_default:
        description: 'Exclude default tests'
        required: false
        default: false
        type: boolean
      include_logs:
        description: 'Download and include CI log files (.txt) in artifact'
        required: false
        default: true
        type: boolean
      skip_rocm:
        description: 'Skip ROCm download'
        required: false
        default: false
        type: boolean
      skip_cuda:
        description: 'Skip CUDA download'
        required: false
        default: false
        type: boolean
      # summarize_xml_testreports flags
      set1_name:
        description: 'Column header name for set1 (e.g. rocm, mi300)'
        required: false
        default: 'rocm'
        type: string
      set2_name:
        description: 'Column header name for set2 (e.g. cuda, mi355)'
        required: false
        default: 'cuda'
        type: string
      filter:
        description: 'Status filter (e.g. SKIPPED-NOT_SKIPPED-MISSED-NOT_MISSED)'
        required: false
        type: string
      csv_name:
        description: 'Custom CSV filename prefix (default: YYYYMMDD_all_tests_status_ARCH)'
        required: false
        type: string

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      arch-matrix: ${{ steps.parse.outputs.matrix }}
    steps:
      - name: Parse arch input into matrix
        id: parse
        run: |
          ARCHS="${{ inputs.arch }}"
          ARCHS=$(echo "$ARCHS" | tr ',[:space:]' '\n' | sed '/^$/d' | tr '\n' ' ')
          JSON=$(echo "$ARCHS" | tr ' ' '\n' | sed '/^$/d' | sed 's/^/"/;s/$/"/' | paste -sd',' | sed 's/^/[/;s/$/]/')
          echo "matrix=$JSON" >> "$GITHUB_OUTPUT"
          echo "Architectures: $JSON"

  generate-parity:
    needs: setup-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJson(needs.setup-matrix.outputs.arch-matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        working-directory: pytorch-unit-test-scripts
        run: pip install -r requirements.txt

      - name: Download artifacts
        working-directory: pytorch-unit-test-scripts
        env:
          GITHUB_TOKEN: ${{ secrets.IFU_GITHUB_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          ARGS="--arch ${{ matrix.arch }}"

          if [ -n "${{ inputs.sha }}" ]; then
            ARGS="$ARGS --sha1 ${{ inputs.sha }}"
          fi
          if [ -n "${{ inputs.pr_id }}" ]; then
            ARGS="$ARGS --pr_id ${{ inputs.pr_id }}"
          fi
          if [ "${{ inputs.exclude_distributed }}" = "true" ]; then
            ARGS="$ARGS --exclude_distributed"
          fi
          if [ "${{ inputs.exclude_inductor }}" = "true" ]; then
            ARGS="$ARGS --exclude_inductor"
          fi
          if [ "${{ inputs.exclude_default }}" = "true" ]; then
            ARGS="$ARGS --exclude_default"
          fi
          ARGS="$ARGS --ignore_status"
          if [ "${{ inputs.include_logs }}" != "true" ]; then
            ARGS="$ARGS --artifacts_only"
          fi
          if [ "${{ inputs.skip_rocm }}" = "true" ]; then
            ARGS="$ARGS --no_rocm"
          fi
          if [ "${{ inputs.skip_cuda }}" = "true" ]; then
            ARGS="$ARGS --no_cuda"
          fi

          echo "Running: python3 ./download_testlogs $ARGS"
          python3 ./download_testlogs $ARGS 2>&1 | tee download_${{ matrix.arch }}.log

      - name: Identify output folder
        id: folder
        working-directory: pytorch-unit-test-scripts
        run: |
          FOLDER=$(ls -dt [0-9]*_[0-9a-f]*/ 2>/dev/null | head -1 | sed 's:/$::')
          if [ -z "$FOLDER" ]; then
            echo "ERROR: No output folder found"
            exit 1
          fi
          echo "folder=$FOLDER" >> "$GITHUB_OUTPUT"
          SHA=$(echo "$FOLDER" | grep -oP '[0-9a-f]{40}')
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          DATE=$(TZ='America/Los_Angeles' date '+%Y%m%d')
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          mv download_${{ matrix.arch }}.log "$FOLDER/" 2>/dev/null || true
          echo "Output folder: $FOLDER, SHA: $SHA, Date: $DATE"

      - name: Download previous week CSV
        id: prev
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARCH="${{ matrix.arch }}"
          mkdir -p prev_csv

          # Try 1: Download from parity-input release (user-edited CSV)
          echo "Checking parity-input release for previous CSV..."
          gh release download parity-input -p "*.csv" -D prev_csv/ -R ${{ github.repository }} 2>/dev/null || true

          PREV=$(find prev_csv/ -name "*.csv" 2>/dev/null | head -1)
          if [ -n "$PREV" ]; then
            echo "Found CSV from parity-input release: $PREV"
            echo "prev_csv=$PREV" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Try 2: Auto-detect last successful parity run
          echo "No release found, auto-detecting last successful parity run..."
          PREV_RUN=$(gh run list --workflow=parity.yml --status=success --limit=1 --json databaseId -q '.[0].databaseId' 2>/dev/null || true)

          if [ -n "$PREV_RUN" ]; then
            echo "Downloading from previous run $PREV_RUN..."
            PATTERN="${{ inputs.csv_name && format('{0}_{1}', inputs.csv_name, matrix.arch) || format('parity-csv-{0}', matrix.arch) }}"
            gh run download "$PREV_RUN" --pattern "$PATTERN" --dir prev_csv/ 2>/dev/null || true

            PREV=$(find prev_csv/ -name "*.csv" ! -name "*_running_time*" ! -name "*_summary*" 2>/dev/null | head -1)
            if [ -n "$PREV" ]; then
              echo "Found CSV from previous run: $PREV"
              echo "prev_csv=$PREV" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          echo "No previous CSV found, skip_reason and existed_last_week will be empty"
          echo "prev_csv=" >> "$GITHUB_OUTPUT"

      - name: Generate CSV
        working-directory: pytorch-unit-test-scripts
        run: |
          FOLDER="${{ steps.folder.outputs.folder }}"
          DATE="${{ steps.folder.outputs.date }}"
          ARCH="${{ matrix.arch }}"

          if [ -n "${{ inputs.csv_name }}" ]; then
            CSV_NAME="${{ inputs.csv_name }}_${ARCH}"
          else
            CSV_NAME="${DATE}_all_tests_status_${ARCH}"
          fi

          ARGS="--set1 $FOLDER/rocm_xml_dir"
          ARGS="$ARGS --set2 $FOLDER/cuda_xml_dir"
          ARGS="$ARGS --set1_name ${{ inputs.set1_name }}"
          ARGS="$ARGS --set2_name ${{ inputs.set2_name }}"
          ARGS="$ARGS --output_csv $FOLDER/${CSV_NAME}.csv"
          ARGS="$ARGS --test_file_running_time_output_csv $FOLDER/${CSV_NAME}_running_time.csv"

          if [ -n "${{ steps.prev.outputs.prev_csv }}" ]; then
            ARGS="$ARGS --prev_week_csv ../${{ steps.prev.outputs.prev_csv }}"
          fi

          if [ -n "${{ inputs.filter }}" ]; then
            ARGS="$ARGS --filter ${{ inputs.filter }}"
          fi

          echo "Running: python3 -u summarize_xml_testreports.py $ARGS"
          python3 -u summarize_xml_testreports.py $ARGS 2>&1 | tee "$FOLDER/xml_processing_${DATE}.log"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.csv_name && format('{0}_{1}', inputs.csv_name, matrix.arch) || format('parity-csv-{0}', matrix.arch) }}
          retention-days: 1
          path: |
            pytorch-unit-test-scripts/${{ steps.folder.outputs.folder }}/*.csv
            pytorch-unit-test-scripts/${{ steps.folder.outputs.folder }}/*.log
            pytorch-unit-test-scripts/${{ steps.folder.outputs.folder }}/*.txt

  generate-summary:
    needs: [setup-matrix, generate-parity]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Download all per-arch CSV artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ inputs.csv_name && format('{0}_*', inputs.csv_name) || 'parity-csv-*' }}
          path: artifacts

      - name: Generate summary
        working-directory: pytorch-unit-test-scripts
        run: |
          ARCHS="${{ inputs.arch }}"
          SHA="${{ inputs.sha }}"
          PR_ID="${{ inputs.pr_id }}"
          SET1="${{ inputs.set1_name }}"
          SET2="${{ inputs.set2_name }}"

          ARCHS=$(echo "$ARCHS" | tr ',[:space:]' ' ')
          CSV_ARGS=""
          ARCH_ARGS=""
          CSV_NAME_INPUT="${{ inputs.csv_name }}"
          for ARCH in $ARCHS; do
            if [ -n "$CSV_NAME_INPUT" ]; then
              ARTIFACT_DIR="../artifacts/${CSV_NAME_INPUT}_${ARCH}"
            else
              ARTIFACT_DIR="../artifacts/parity-csv-${ARCH}"
            fi
            CSV=$(find "$ARTIFACT_DIR"/ -name "*.csv" ! -name "*_running_time*" ! -name "*_summary*" 2>/dev/null | head -1)
            if [ -z "$CSV" ]; then
              echo "WARNING: No CSV found for $ARCH, skipping"
              continue
            fi
            echo "Found CSV for $ARCH: $CSV"
            CSV_ARGS="$CSV_ARGS $CSV"
            ARCH_ARGS="$ARCH_ARGS $ARCH"
          done

          if [ -z "$CSV_ARGS" ]; then
            echo "ERROR: No CSVs found for any architecture"
            exit 1
          fi

          ARGS="--csv $CSV_ARGS --arch $ARCH_ARGS"
          ARGS="$ARGS --set1_name $SET1 --set2_name $SET2"

          if [ -n "$SHA" ]; then
            ARGS="$ARGS --sha $SHA"
          else
            DETECTED_SHA=$(basename $(find ../artifacts/ -name "*.csv" | head -1) | grep -oP '[0-9a-f]{40}' || true)
            if [ -n "$DETECTED_SHA" ]; then
              ARGS="$ARGS --sha $DETECTED_SHA"
            fi
          fi
          if [ -n "$PR_ID" ]; then
            ARGS="$ARGS --pr_id $PR_ID"
          fi

          if [ -n "${{ inputs.csv_name }}" ]; then
            OUTPUT="${{ inputs.csv_name }}_summary"
          else
            DATE=$(TZ='America/Los_Angeles' date '+%Y%m%d')
            OUTPUT="${DATE}_parity_summary"
          fi
          ARGS="$ARGS --output $OUTPUT"

          echo "Running: python3 generate_summary.py $ARGS"
          python3 generate_summary.py $ARGS

          cat "${OUTPUT}.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.csv_name && format('{0}_summary', inputs.csv_name) || 'parity-summary' }}
          retention-days: 1
          path: |
            pytorch-unit-test-scripts/*_summary.csv
            pytorch-unit-test-scripts/*_summary.md

      - name: Add artifact links to summary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARTIFACTS_JSON=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts --paginate -q '.artifacts[] | {name, id}')
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts"

          {
            echo ""
            echo "### ARTIFACTS"
            echo ""
            echo "| Artifact | Link |"
            echo "| --- | --- |"
            echo "$ARTIFACTS_JSON" | jq -r '"| \(.name) | [Download]('"${RUN_URL}"'/\(.id)) |"'
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
