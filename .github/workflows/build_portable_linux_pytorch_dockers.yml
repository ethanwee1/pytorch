name: Build Portable Linux PyTorch Dockers

on:
  push:
    branches:
      - add-portable-docker-build
  workflow_dispatch:
    inputs:
      amdgpu_family:
        type: choice
        options:
          - gfx94X-dcgpu
          - gfx950-dcgpu
          - gfx90X-dcgpu
          - gfx120X-all
          - gfx110X-all
          - gfx110X-dgpu
          - gfx103X-dgpu
          - gfx101X-dgpu
        default: gfx94X-dcgpu
      python_version:
        required: true
        type: string
        default: "3.12"
      rocm_version:
        description: ROCm version to install (e.g. "7.13.0a20260413")
        required: true
        type: string
      torch_version:
        description: PyTorch version (optional - installs latest from index if not set)
        type: string
      torchaudio_version:
        description: Torchaudio version (optional - installs latest from index if not set)
        type: string
      torchvision_version:
        description: Torchvision version (optional - installs latest from index if not set)
        type: string
      triton_version:
        description: Triton version (optional - uses torch dependency if not set)
        type: string
      index_url:
        description: Base URL for PyTorch wheels index
        required: false
        type: string
        default: "https://rocm.nightlies.amd.com/v2-staging"
      base_image:
        description: Base Docker image (default ubuntu:24.04)
        type: string
        default: "ubuntu:24.04"

permissions:
  contents: read

run-name: Build PyTorch Docker (${{ inputs.amdgpu_family || 'gfx94X-dcgpu' }}, torch ${{ inputs.torch_version || 'latest' }}, ROCm ${{ inputs.rocm_version || '7.13.0a20260413' }})

env:
  REGISTRY: docker.io
  IMAGE_NAME: rocmshared/pytorch-private
  # Defaults for push-triggered runs (inputs.* are empty on push)
  DEFAULT_AMDGPU_FAMILY: gfx94X-dcgpu
  DEFAULT_PYTHON_VERSION: "3.12"
  DEFAULT_ROCM_VERSION: "7.13.0a20260413"
  DEFAULT_INDEX_URL: "https://rocm.nightlies.amd.com/v2-staging"
  DEFAULT_BASE_IMAGE: "ubuntu:24.04"

jobs:
  build-docker:
    name: Build Docker | ${{ inputs.amdgpu_family || 'gfx94X-dcgpu' }} | torch ${{ inputs.torch_version || 'latest' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve inputs with defaults
        id: cfg
        run: |
          echo "amdgpu_family=${{ inputs.amdgpu_family || env.DEFAULT_AMDGPU_FAMILY }}" >> $GITHUB_OUTPUT
          echo "python_version=${{ inputs.python_version || env.DEFAULT_PYTHON_VERSION }}" >> $GITHUB_OUTPUT
          echo "rocm_version=${{ inputs.rocm_version || env.DEFAULT_ROCM_VERSION }}" >> $GITHUB_OUTPUT
          echo "index_url=${{ inputs.index_url || env.DEFAULT_INDEX_URL }}" >> $GITHUB_OUTPUT
          echo "base_image=${{ inputs.base_image || env.DEFAULT_BASE_IMAGE }}" >> $GITHUB_OUTPUT
          echo "torch_version=${{ inputs.torch_version }}" >> $GITHUB_OUTPUT
          echo "torchaudio_version=${{ inputs.torchaudio_version }}" >> $GITHUB_OUTPUT
          echo "torchvision_version=${{ inputs.torchvision_version }}" >> $GITHUB_OUTPUT
          echo "triton_version=${{ inputs.triton_version }}" >> $GITHUB_OUTPUT

      - name: Generate Docker image tag
        id: docker-tag
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          COMMIT="$(git rev-parse --short=8 HEAD)"
          ROCM_VERSION="${{ steps.cfg.outputs.rocm_version }}"
          PYTHON_VERSION="${{ steps.cfg.outputs.python_version }}"
          GFX="${{ steps.cfg.outputs.amdgpu_family }}"
          BASE_IMAGE="${{ steps.cfg.outputs.base_image }}"

          # Extract OS name from base image (e.g. "ubuntu:24.04" -> "ubuntu24.04")
          OS=$(echo "${BASE_IMAGE}" | tr -d ':' | tr '/' '-')

          IMAGE_TAG="pytorch-${BRANCH}-${COMMIT}-rocm${ROCM_VERSION}-${OS}-py${PYTHON_VERSION}-${GFX}"
          # Docker tags cannot contain +
          IMAGE_TAG="${IMAGE_TAG//+/-}"
          echo "tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "Generated image tag: ${IMAGE_TAG}"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERUSERNAME }}
          password: ${{ secrets.DCKRPAT }}

      - name: Build Docker image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.docker-tag.outputs.tag }}"

          docker build \
            --file dockerfiles/pytorch_runtime.Dockerfile \
            --tag "${IMAGE}" \
            --label "org.opencontainers.image.title=PyTorch ROCm" \
            --label "org.opencontainers.image.description=PyTorch with ROCm runtime" \
            --label "org.opencontainers.image.version=${{ steps.cfg.outputs.torch_version }}" \
            --label "pytorch.version=${{ steps.cfg.outputs.torch_version }}" \
            --label "rocm.version=${{ steps.cfg.outputs.rocm_version }}" \
            --label "amdgpu.family=${{ steps.cfg.outputs.amdgpu_family }}" \
            --build-arg "BASE_IMAGE=${{ steps.cfg.outputs.base_image }}" \
            --build-arg "ROCM_VERSION=${{ steps.cfg.outputs.rocm_version }}" \
            --build-arg "AMDGPU_FAMILY=${{ steps.cfg.outputs.amdgpu_family }}" \
            --build-arg "PYTHON_VERSION=${{ steps.cfg.outputs.python_version }}" \
            --build-arg "INDEX_URL=${{ steps.cfg.outputs.index_url }}" \
            --build-arg "TORCH_VERSION=${{ steps.cfg.outputs.torch_version }}" \
            --build-arg "TORCHAUDIO_VERSION=${{ steps.cfg.outputs.torchaudio_version }}" \
            --build-arg "TORCHVISION_VERSION=${{ steps.cfg.outputs.torchvision_version }}" \
            --build-arg "TRITON_VERSION=${{ steps.cfg.outputs.triton_version }}" \
            .

          echo "Docker image built successfully: ${IMAGE}"

      - name: Get ROCm packages info
        id: rocm-packages
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.docker-tag.outputs.tag }}"
          echo "Getting ROCm packages from Docker image..."

          ROCM_PACKAGES=$(docker run --rm "${IMAGE}" pip freeze | grep -i rocm || echo "No ROCm packages found")
          echo "rocm_packages<<EOF" >> $GITHUB_OUTPUT
          echo "${ROCM_PACKAGES}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "ROCm packages:"
          echo "${ROCM_PACKAGES}"

      - name: Run PyTorch smoke test
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.docker-tag.outputs.tag }}"
          echo "Running test_binary_ufuncs (CPU) inside Docker image..."
          docker run --rm "${IMAGE}" \
            bash -c "pip install pytest pytest-timeout -r /workspace/pytorch/.ci/docker/requirements-ci.txt && cd /tmp && python -m pytest /workspace/pytorch/test/test_binary_ufuncs.py -x -v --timeout=600 -k cpu"

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.docker-tag.outputs.tag }}
          echo "Docker image pushed successfully"

      - name: Post-build summary
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.docker-tag.outputs.tag }}"

          echo "## PyTorch Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Docker Image" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${IMAGE}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| AMDGPU Family | ${{ steps.cfg.outputs.amdgpu_family }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python Version | ${{ steps.cfg.outputs.python_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Base Image | ${{ steps.cfg.outputs.base_image }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Index URL | ${{ steps.cfg.outputs.index_url }} |" >> $GITHUB_STEP_SUMMARY
          PACKAGES='${{ steps.rocm-packages.outputs.rocm_packages }}'
          PACKAGES_ROW=$(printf '%s' "$PACKAGES" | sed -e 's/&/\&amp;/g' -e 's/</\&lt;/g' -e 's/>/\&gt;/g')
          PACKAGES_ROW="${PACKAGES_ROW//$'\n'/<br>}"
          echo "| ROCm packages | ${PACKAGES_ROW} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Usage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${IMAGE}" >> $GITHUB_STEP_SUMMARY
          echo "docker run --rm -it --device=/dev/kfd --device=/dev/dri \\" >> $GITHUB_STEP_SUMMARY
          echo "  --security-opt seccomp=unconfined \\" >> $GITHUB_STEP_SUMMARY
          echo "  ${IMAGE}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
