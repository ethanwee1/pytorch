name: Build Portable Linux PyTorch Dockers

on:
  schedule:
    - cron: "0 6 * * *"   # daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      pytorch_repo:
        description: "GitHub repo to clone into the image (e.g. 'pytorch/pytorch' or 'ROCm/pytorch')"
        type: string
        default: "pytorch/pytorch"
      pytorch_branch:
        description: "Branch to clone. Default 'nightly' matches theRock wheel builds. For releases use ROCm/pytorch with 'release/2.11', 'release/2.10', etc."
        type: string
        default: "nightly"
      python_version:
        type: choice
        options:
          - "3.12"
          - "3.10"
          - "3.11"
          - "3.13"
          - "3.14"
        default: "3.12"
      amdgpu_family:
        type: choice
        options:
          - gfx94X-dcgpu
          - gfx950-dcgpu
          - gfx90X-dcgpu
          - gfx120X-all
          - gfx110X-all
          - gfx110X-dgpu
          - gfx103X-dgpu
          - gfx101X-dgpu
        default: gfx94X-dcgpu
      rocm_version:
        description: "ROCm version (e.g. '7.13.0a20260413'). Leave empty to auto-discover from the latest available torch wheel."
        type: string
      index_url:
        description: Base URL for PyTorch wheels index
        type: string
        default: "https://rocm.nightlies.amd.com/v2-staging"

permissions:
  contents: read

# Parent workflow owns all default literals. The reusable callee receives every
# input explicitly and uses inputs.* everywhere internally.
run-name: >-
  ${{ github.event_name == 'schedule' && 'Nightly Docker builds' ||
      format('Build PyTorch Docker ({0}, {1}/{2}, ROCm {3})',
             inputs.amdgpu_family || 'gfx94X-dcgpu',
             inputs.pytorch_repo || 'pytorch/pytorch',
             inputs.pytorch_branch || 'nightly',
             inputs.rocm_version || 'auto') }}

jobs:
  nightly-matrix:
    if: github.event_name == 'schedule'
    strategy:
      fail-fast: false
      matrix:
        include:
          - pytorch_repo: pytorch/pytorch
            pytorch_branch: nightly
            label: nightly
          - pytorch_repo: ROCm/pytorch
            pytorch_branch: release/2.11
            label: "2.11"
          - pytorch_repo: ROCm/pytorch
            pytorch_branch: release/2.10
            label: "2.10"
          - pytorch_repo: ROCm/pytorch
            pytorch_branch: release/2.9
            label: "2.9"
    name: "Nightly | torch ${{ matrix.label }} | py3.12 | gfx94X-dcgpu"
    uses: ./.github/workflows/_build_portable_linux_pytorch_docker.yml
    secrets: inherit
    with:
      pytorch_repo: ${{ matrix.pytorch_repo }}
      pytorch_branch: ${{ matrix.pytorch_branch }}
      python_version: "3.12"
      amdgpu_family: gfx94X-dcgpu
      rocm_version: auto
      index_url: "https://rocm.nightlies.amd.com/v2-staging"
      base_image: "ubuntu:24.04"
      registry: docker.io
      image_name: rocm/pytorch-private
      job_display_name: "Nightly | torch ${{ matrix.label }} | py3.12 | gfx94X-dcgpu"
      summary_title: "PyTorch Docker Build - ${{ matrix.label }}"

  build-docker:
    if: github.event_name == 'workflow_dispatch'
    name: "Build | ${{ inputs.amdgpu_family || 'gfx94X-dcgpu' }} | ${{ inputs.pytorch_repo || 'pytorch/pytorch' }}@${{ inputs.pytorch_branch || 'nightly' }}"
    uses: ./.github/workflows/_build_portable_linux_pytorch_docker.yml
    secrets: inherit
    with:
      pytorch_repo: ${{ inputs.pytorch_repo || 'pytorch/pytorch' }}
      pytorch_branch: ${{ inputs.pytorch_branch || 'nightly' }}
      python_version: ${{ inputs.python_version || '3.12' }}
      amdgpu_family: ${{ inputs.amdgpu_family || 'gfx94X-dcgpu' }}
      rocm_version: ${{ inputs.rocm_version || 'auto' }}
      index_url: ${{ inputs.index_url || 'https://rocm.nightlies.amd.com/v2-staging' }}
      base_image: "ubuntu:24.04"
      registry: docker.io
      image_name: rocm/pytorch-private
      job_display_name: "Build | ${{ inputs.amdgpu_family || 'gfx94X-dcgpu' }} | ${{ inputs.pytorch_repo || 'pytorch/pytorch' }}@${{ inputs.pytorch_branch || 'nightly' }}"
      summary_title: "PyTorch Docker Build Summary"
